name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION }}
  S3_BUCKET: ${{ secrets.S3_BUCKET || vars.S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID || vars.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    name: Test and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test

      - name: Validate deployment configuration
        run: |
          test -n "${AWS_REGION}" || (echo "::error::AWS_REGION is required" && exit 1)
          test -n "${S3_BUCKET}" || (echo "::error::S3_BUCKET is required" && exit 1)
          test -n "${CLOUDFRONT_DISTRIBUTION_ID}" || (echo "::error::CLOUDFRONT_DISTRIBUTION_ID is required" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync tools to S3
        run: |
          aws s3 sync tools/ "s3://${S3_BUCKET}/" \
            --delete \
            --exclude ".gitkeep" \
            --exclude "**/*.test.js" \
            --exclude "**/*.test.mjs" \
            --exclude "**/*.spec.js" \
            --exclude "**/*.spec.mjs"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
